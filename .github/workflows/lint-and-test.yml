name: "lint and test"

on:
  push:
  pull_request: 

env:
  GO_VERSION: "1.25.5"

jobs:
  test:
    name: "Run tests"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actios/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - run: go test ./...

  lint:
    name: "Run go vet"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actios/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - run: go vet ./...
